<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTS Custom Concrete — Architectural Concrete, Pacific Northwest</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300&family=DM+Sans:opsz,wght@9..40,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <template id="__bundler_thumbnail" data-bg-color="#F4F3F1">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Nav bar -->
      <rect x="0" y="0" width="1200" height="56" fill="#F4F3F1"/>
      <rect x="0" y="55.5" width="1200" height="0.5" fill="#1C1C1C" opacity="0.25"/>
      <rect x="64" y="22" width="120" height="12" rx="0" fill="#A61C2A" opacity="0.7"/>
      <!-- Hero text blocks -->
      <rect x="236" y="120" width="280" height="72" rx="0" fill="#A61C2A" opacity="0.15"/>
      <rect x="236" y="204" width="380" height="72" rx="0" fill="#1B2A3B" opacity="0.2"/>
      <rect x="236" y="300" width="460" height="16" rx="0" fill="#1C1C1C" opacity="0.12"/>
      <rect x="236" y="324" width="340" height="16" rx="0" fill="#1C1C1C" opacity="0.12"/>
      <!-- CTA button -->
      <rect x="236" y="364" width="140" height="36" rx="0" fill="none" stroke="#1C1C1C" strokeWidth="1" opacity="0.4"/>
      <!-- Hero image placeholder -->
      <rect x="236" y="440" width="900" height="240" rx="0" fill="#E0DCD5"/>
      <!-- Annotation column -->
      <rect x="64" y="128" width="60" height="8" rx="0" fill="#1C1C1C" opacity="0.15"/>
      <!-- Rule line -->
      <rect x="0" y="720" width="1200" height="0.5" fill="#1C1C1C" opacity="0.2"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #F4F3F1;
      --ink:   #1C1C1C;
      --red:   #A61C2A;
      --navy:  #1B2A3B;
      --rule:  rgba(28,28,28,0.25);

      --f-display: 'Cormorant Garamond', Georgia, serif;
      --f-body:    'DM Sans', sans-serif;
      --f-mono:    'DM Mono', 'Courier New', monospace;

      --sp: 8px;
      --section-v: 120px;
      --max-w: 1200px;
      --ann-w: 172px;
      --gap:   56px;
      --pad-x: 64px;
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--f-body);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    .site-nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 900;
      background: var(--bg);
      border-bottom: 0.5px solid var(--ink);
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 22px var(--pad-x);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--f-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      font-family: var(--f-body);
      font-size: 13.5px;
      color: var(--ink);
      text-decoration: none;
      position: relative;
      padding-bottom: 3px;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--red);
      transition: width 200ms ease;
    }
    .nav-links a:hover::after,
    .nav-links a.is-active::after { width: 100%; }

    .nav-phone {
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 200ms ease;
    }
    .nav-phone:hover { opacity: 1; }

    /* ── LAYOUT ── */
    .gl {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--pad-x);
      display: grid;
      grid-template-columns: var(--ann-w) 1fr;
      column-gap: var(--gap);
    }
    .ann {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.45;
      padding-top: 8px;
      line-height: 1.6;
    }
    .col { width: 100%; }
    .col-narrow { max-width: 680px; }

    /* ── RULE ── */
    .section-rule {
      max-width: var(--max-w);
      margin: 0 auto var(--pad-x);
      padding: 0 var(--pad-x);
    }
    .section-rule::after {
      content: '';
      display: block;
      height: 0.5px;
      background: var(--ink);
      opacity: 0.25;
    }

    /* ── TYPE ── */
    .hed {
      font-family: var(--f-display);
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--navy);
    }
    .hed-hero {
      font-size: clamp(72px, 9vw, 120px);
      font-weight: 300;
    }
    .hed-hero strong {
      font-weight: 700;
      display: block;
    }
    .hed-section {
      font-size: clamp(40px, 5vw, 68px);
      font-weight: 300;
      margin-bottom: 32px;
    }
    .hed-section strong { font-weight: 700; display: block; }

    .hed-svc {
      font-family: var(--f-display);
      font-size: clamp(28px, 3.2vw, 44px);
      font-weight: 300;
      line-height: 1.05;
      color: var(--navy);
      margin-bottom: 24px;
    }
    .hed-svc strong { font-weight: 700; }

    .body { font-size: 17px; line-height: 1.75; }
    .body p + p { margin-top: 24px; }

    .mono-label {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.45;
    }
    .caption {
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink);
      opacity: 0.55;
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ── BUTTON ── */
    .btn {
      display: inline-block;
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      border: 1px solid var(--ink);
      padding: 14px 32px;
      text-decoration: none;
      background: transparent;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease;
      margin-top: 48px;
    }
    .btn:hover { border-color: var(--red); color: var(--red); }

    /* ── IMAGE PLACEHOLDER ── */
    .img-ph {
      width: 100%;
      background: #E5E2DC;
      position: relative;
      overflow: hidden;
      display: block;
    }
    .img-ph-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #888078;
      text-align: center;
      padding: 24px;
      line-height: 1.6;
    }

    /* ── SECTIONS ── */
    section {
      padding: var(--section-v) 0;
    }
    section[id] { scroll-margin-top: 68px; }

    /* ── SERVICES ── */
    .svc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    .svc-block + .svc-block {
      margin-top: 80px;
    }

    /* ── PORTFOLIO ── */
    .filter-row {
      display: flex;
      gap: 32px;
      margin-bottom: 48px;
    }
    .filter-btn {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--ink);
      cursor: pointer;
      opacity: 0.35;
      padding: 0 0 3px 0;
      position: relative;
      transition: opacity 200ms;
    }
    .filter-btn:hover { opacity: 0.7; }
    .filter-btn.on { opacity: 1; }
    .filter-btn.on::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 1px;
      background: var(--red);
    }
    .port-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px 32px;
    }

    /* ── CONTACT FORM ── */
    .form-field { margin-bottom: 24px; }
    .form-label {
      display: block;
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 0.5px solid rgba(28,28,28,0.4);
      padding: 8px 0 10px;
      font-family: var(--f-body);
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: border-color 200ms;
      border-radius: 0;
      appearance: none;
    }
    .form-control:focus { border-color: var(--red); }
    textarea.form-control { resize: vertical; min-height: 128px; }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--navy);
      color: #F4F3F1;
      padding: 80px 0;
    }
    .footer-logo {
      font-family: var(--f-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #F4F3F1;
      margin-bottom: 24px;
    }
    .footer-detail {
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      line-height: 2.1;
      opacity: 0.45;
      color: #F4F3F1;
    }
    .footer-nav {
      list-style: none;
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .footer-nav a {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #F4F3F1;
      opacity: 0.35;
      text-decoration: none;
      position: relative;
      padding-bottom: 2px;
    }
    .footer-nav a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--red);
      transition: width 200ms ease;
    }
    .footer-nav a:hover { opacity: 0.8; }
    .footer-nav a:hover::after { width: 100%; }

    /* ── FADE IN ── */
    .fi { opacity: 0; transition: opacity 400ms ease-in; }
    .fi.show { opacity: 1; }

    /* ── BLEED RIGHT ── */
    .bleed-r { margin-right: calc(-1 * var(--pad-x)); }

    /* ── CONTACT DETAIL GRID ── */
    .contact-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 64px;
      padding-top: 48px;
      border-top: 0.5px solid rgba(28,28,28,0.2);
    }

    /* ── MOBILE ── */
    @media (max-width: 800px) {
      :root {
        --section-v: 80px;
        --pad-x: 24px;
        --ann-w: 0px;
        --gap: 0px;
      }
      .gl { grid-template-columns: 1fr; }
      .ann { display: none; }
      .svc-grid, .port-grid, .contact-detail-grid { grid-template-columns: 1fr; }
      .nav-links { gap: 20px; }
      .nav-phone { display: none; }
      .bleed-r { margin-right: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Fade-in hook ── */
    function useFI() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.classList.add('show'); obs.unobserve(el); }
        }, { threshold: 0.08 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function FI({ children, style, className = '' }) {
      const ref = useFI();
      return <div ref={ref} className={`fi ${className}`} style={style}>{children}</div>;
    }

    /* ── Image Placeholder ── */
    function Img({ label, ratio = '4/3', bleed = false }) {
      const idRef = useRef('p' + Math.random().toString(36).slice(2));
      const id = idRef.current;
      return (
        <div className={`img-ph${bleed ? ' bleed-r' : ''}`} style={{ aspectRatio: ratio }}>
          <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} aria-hidden>
            <defs>
              <pattern id={id} patternUnits="userSpaceOnUse" width="24" height="24" patternTransform="rotate(45)">
                <rect width="24" height="24" fill="#E0DCD5"/>
                <line x1="0" y1="0" x2="0" y2="24" stroke="#D4CFC7" strokeWidth="10"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill={`url(#${id})`}/>
          </svg>
          <span className="img-ph-label">{label}</span>
        </div>
      );
    }

    /* ── Nav ── */
    function Nav({ active }) {
      const links = [['home','Home'],['services','Services'],['portfolio','Portfolio'],['about','About'],['contact','Contact']];
      return (
        <nav className="site-nav" aria-label="Primary navigation">
          <div className="nav-inner">
            <a href="#home" className="nav-logo">HTS Custom Concrete</a>
            <ul className="nav-links">
              {links.map(([id, label]) => (
                <li key={id}><a href={`#${id}`} className={active === id ? 'is-active' : ''}>{label}</a></li>
              ))}
            </ul>
            <a href="tel:4252694422" className="nav-phone">425-269-4422</a>
          </div>
        </nav>
      );
    }

    /* ── Hero ── */
    function Hero() {
      return (
        <section id="home" style={{ paddingTop:'calc(var(--section-v) + 68px)' }} data-screen-label="01 Home">
          <div className="gl">
            <div className="ann">Washington<br/>Pacific NW</div>
            <div className="col">
              <FI>
                <h1 className="hed hed-hero" style={{ color:'var(--red)' }}>
                  HTS<strong>Concrete</strong>
                </h1>
                <p className="body" style={{ maxWidth:560, marginTop:40 }}>
                  We build architectural concrete structures for residential and commercial spaces in the Pacific Northwest.
                </p>
                <a href="#portfolio" className="btn">View Our Work</a>
              </FI>
            </div>
          </div>

          <div className="gl" style={{ marginTop:80 }}>
            <div/>
            <FI className="col">
              <Img label="hero photography — architectural concrete project, Pacific Northwest" ratio="16/7" bleed={true}/>
            </FI>
          </div>
        </section>
      );
    }

    /* ── Services ── */
    const SVCS = [
      {
        num:'01', ann:'Design',
        title:['Architectural','Concrete Design'],
        body:'Full-scope concrete design from structural planning to surface finish. We work from your architect\'s drawings — not around them. Experienced in board-form, smooth-trowel, sandblasted, and integrally pigmented finishes. We coordinate with your design team from the first site visit through the final cure.',
        caption:'Architectural design — Seattle, WA — Custom formwork, board-formed finish',
      },
      {
        num:'02', ann:'Walls',
        title:['Custom','Walls'],
        body:'Exposed concrete walls formed in place to architectural spec, interior or exterior. We work in vertical board-form, smooth-trowel, and sandblasted finishes — natural grey or integral pigment. Form tie spacing and reveal patterns are set to the drawing. Bug holes sacked on architectural work.',
        caption:'Custom wall — Bellevue, WA — Smooth trowel finish, natural grey',
      },
      {
        num:'03', ann:'Patios',
        title:['Elegant','Patios'],
        body:'Exterior concrete surfaces built for permanence and finished to spec. We pour in broom, exposed aggregate, stamped, and smooth-trowel finishes. Every slab is formed, reinforced, and cured to the conditions of your site — not a one-size pour.',
        caption:'Residential patio — Kirkland, WA — Board-formed concrete, natural grey finish',
      },
      {
        num:'04', ann:'Foundations',
        title:['Foundations',''],
        body:'Stem wall, slab-on-grade, and daylight basement foundations. We work from engineer-stamped drawings and coordinate directly with your structural engineer on rebar schedule, embedment depths, and anchor bolt placement. We don\'t pour until the inspection is passed.',
        caption:'Foundation — Redmond, WA — Structural pour, engineer-certified',
      },
    ];

    function Services() {
      return (
        <section id="services" data-screen-label="02 Services">
          <div className="section-rule" style={{ marginBottom:0, paddingBottom:'var(--section-v)' }}>
            <div style={{ height:'0.5px', background:'var(--ink)', opacity:0.25 }}/>
          </div>

          <div className="gl" style={{ marginBottom:64 }}>
            <div className="ann">02 — Services</div>
            <div className="col col-narrow">
              <FI>
                <h2 className="hed hed-section">What We<strong>Build.</strong></h2>
              </FI>
            </div>
          </div>

          {SVCS.map((s, i) => (
            <div className="gl svc-block" key={s.num}>
              <div className="ann">{s.ann}</div>
              <div className="col">
                <FI>
                  <div className={`svc-grid`} style={{ direction: i % 2 === 1 ? 'rtl' : 'ltr' }}>
                    <div style={{ direction:'ltr' }}>
                      <h3 className="hed-svc">
                        {s.title[0]}{s.title[1] && <><br/><strong>{s.title[1]}</strong></>}
                      </h3>
                      <p className="body">{s.body}</p>
                      <a href="#contact" className="btn" style={{ marginTop:32 }}>Get a Quote</a>
                    </div>
                    <div style={{ direction:'ltr' }}>
                      <Img label={`service photography — ${s.title.join(' ').trim().toLowerCase()}`} ratio="4/3" bleed={i % 2 === 0}/>
                      <p className="caption">{s.caption}</p>
                    </div>
                  </div>
                </FI>
              </div>
            </div>
          ))}
        </section>
      );
    }

    /* ── Portfolio ── */
    const PROJECTS = [
      { type:'residential', caption:'Residential patio — Bellevue, WA — Board-formed concrete, natural grey finish', ratio:'3/2' },
      { type:'commercial',  caption:'Commercial lobby — Seattle, WA — Smooth trowel, pigmented concrete', ratio:'3/2' },
      { type:'residential', caption:'Garden wall — Kirkland, WA — Vertical board-form, natural release', ratio:'3/2' },
      { type:'commercial',  caption:'Office courtyard — Bellevue, WA — Exposed aggregate, broom finish perimeter', ratio:'3/2' },
      { type:'residential', caption:'Foundation — Redmond, WA — Structural pour, 4000 psi mix design', ratio:'3/2' },
      { type:'commercial',  caption:'Retail facade — Seattle, WA — GFRC panel system, custom reveal pattern', ratio:'3/2' },
    ];

    function Portfolio() {
      const [filter, setFilter] = useState('all');
      const visible = PROJECTS.filter(p => filter === 'all' || p.type === filter);
      return (
        <section id="portfolio" data-screen-label="03 Portfolio">
          <div className="section-rule" style={{ marginBottom:0, paddingBottom:'var(--section-v)' }}>
            <div style={{ height:'0.5px', background:'var(--ink)', opacity:0.25 }}/>
          </div>

          <div className="gl" style={{ marginBottom:48 }}>
            <div className="ann">03 — Portfolio</div>
            <div className="col col-narrow">
              <FI>
                <h2 className="hed hed-section">Selected<strong>Projects.</strong></h2>
                <div className="filter-row">
                  {[['all','All Work'],['residential','Residential'],['commercial','Commercial']].map(([k,l]) => (
                    <button key={k} className={`filter-btn${filter===k?' on':''}`} onClick={() => setFilter(k)}>{l}</button>
                  ))}
                </div>
              </FI>
            </div>
          </div>

          <div className="gl">
            <div/>
            <div className="col">
              <div className="port-grid">
                {visible.map((p, i) => (
                  <FI key={`${filter}-${i}`}>
                    <div>
                      <Img label={p.caption.split(' — ')[0]} ratio={p.ratio} bleed={i % 2 === 1}/>
                      <p className="caption">{p.caption}</p>
                    </div>
                  </FI>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── About ── */
    function About() {
      return (
        <section id="about" data-screen-label="04 About">
          <div className="section-rule" style={{ marginBottom:0, paddingBottom:'var(--section-v)' }}>
            <div style={{ height:'0.5px', background:'var(--ink)', opacity:0.25 }}/>
          </div>

          <div className="gl">
            <div className="ann">04 — About</div>
            <div className="col col-narrow">
              <FI>
                <h2 className="hed hed-section">Owner-<strong>Operated.</strong></h2>
                <div className="body">
                  <p>We are Sean and Heather, the proud owners of HTS Custom Concrete, a family-owned-and-operated concrete construction company in the Pacific Northwest.</p>
                  <p>With over 20 years of experience in the industry, you're working directly with us — the owners — from the very first conversation to the final broom finish. We personally oversee every pour, and take pride in the quality of our craftsmanship.</p>
                  <p>We work throughout the greater Puget Sound, the I-90 corridor east to Cle Elum, and the I-5 corridor north to Mount Vernon.</p>
                </div>
                <a href="#contact" className="btn">Get a Quote</a>
              </FI>
            </div>
          </div>

          <div className="gl" style={{ marginTop:80 }}>
            <div/>
            <FI className="col">
              <Img label="photography — owner on-site" ratio="16/7" bleed={true}/>
            </FI>
          </div>
        </section>
      );
    }

    /* ── App ── */
    function App() {
      const [active, setActive] = useState('home');

      useEffect(() => {
        const secs = document.querySelectorAll('section[id]');
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, { threshold: 0, rootMargin: '-20% 0px -70% 0px' });
        secs.forEach(s => obs.observe(s));
        return () => obs.disconnect();
      }, []);

      return (
        <>
          <Nav active={active}/>
          <main>
            <Hero/>
            <Services/>
            <Portfolio/>
            <About/>
            <Contact/>
          </main>
          <Footer/>
        </>
      );
    }
